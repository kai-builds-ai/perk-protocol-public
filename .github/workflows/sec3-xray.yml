name: Sec3 X-ray Scan

on:
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Sec3 X-ray
        uses: sec3dev/x-ray-action@v2
        with:
          program-path: ./programs/perk-protocol
          severity-threshold: medium
