name: Kani Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'programs/perk-protocol/src/**'
      - 'programs/perk-protocol/tests/**'
      - '.github/workflows/kani.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      harnesses:
        description: 'Comma-separated harness names to run (empty = all)'
        required: false
        default: ''

concurrency:
  group: kani-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  extract:
    name: Extract Harnesses
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract harness names from proof files
        id: extract
        run: |
          FILTER="${{ github.event.inputs.harnesses }}"
          MATRIX="[]"
          if [ -n "$FILTER" ]; then
            # Run only specified harnesses
            for h in $(echo "$FILTER" | tr ',' ' '); do
              # Find which suite file contains this harness
              for file in programs/perk-protocol/tests/proofs_*.rs; do
                if grep -q "fn ${h}(" "$file"; then
                  suite=$(basename "$file" .rs)
                  MATRIX=$(echo "$MATRIX" | jq -c --arg s "$suite" --arg h "$h" '. + [{"suite": $s, "harness": $h}]')
                  break
                fi
              done
            done
          else
            # Run all harnesses
            for file in programs/perk-protocol/tests/proofs_*.rs; do
              suite=$(basename "$file" .rs)
              harnesses=$(grep -oP 'fn \K\w+(?=\()' "$file" || true)
              for h in $harnesses; do
                MATRIX=$(echo "$MATRIX" | jq -c --arg s "$suite" --arg h "$h" '. + [{"suite": $s, "harness": $h}]')
              done
            done
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$MATRIX" | jq length) harnesses"

  verify:
    name: "${{ matrix.harness }}"
    needs: extract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.extract.outputs.matrix) }}

    defaults:
      run:
        working-directory: programs/perk-protocol

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/kani*
            ~/.cargo/bin/cargo-kani
            programs/perk-protocol/target
          key: kani-${{ runner.os }}-${{ hashFiles('programs/perk-protocol/Cargo.lock') }}
          restore-keys: kani-${{ runner.os }}-

      - name: Install Kani
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      - name: "Verify: ${{ matrix.harness }}"
        run: |
          timeout 1800 cargo kani --tests --harness "${{ matrix.harness }}" \
            --solver cadical \
            --default-unwind 30 \
            --no-unwinding-checks \
            --output-format terse

  summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  Kani Formal Verification — per-harness jobs"
          echo "═══════════════════════════════════════════════"
          if [ "${{ needs.verify.result }}" = "success" ]; then
            echo "  ✅ ALL PROOFS VERIFIED"
          else
            echo "  ❌ SOME PROOFS FAILED — check individual jobs"
            exit 1
          fi
