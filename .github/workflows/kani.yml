name: Kani Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'programs/perk-protocol/src/**'
      - 'programs/perk-protocol/tests/**'
      - '.github/workflows/kani.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - proofs_arithmetic
          - proofs_safety
          - proofs_margin
          - proofs_invariants
          - proofs_funding
          - proofs_liveness
          - proofs_engine
          - proofs_instructions
          - proofs_instructions_2

    defaults:
      run:
        working-directory: programs/perk-protocol

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry + kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/kani*
            ~/.cargo/bin/cargo-kani
            programs/perk-protocol/target
          key: kani-${{ runner.os }}-${{ hashFiles('programs/perk-protocol/Cargo.lock') }}
          restore-keys: kani-${{ runner.os }}-

      - name: Install Kani
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      - name: Extract harness names
        id: harnesses
        run: |
          HARNESSES=$(grep -oP 'fn \K\w+(?=\()' tests/${{ matrix.suite }}.rs | tr '\n' ' ')
          echo "list=$HARNESSES" >> "$GITHUB_OUTPUT"
          echo "Found harnesses: $HARNESSES"

      - name: Run Kani proofs
        run: |
          PASSED=0
          FAILED=0
          ERRORS=""

          for harness in ${{ steps.harnesses.outputs.list }}; do
            echo "::group::⚡ $harness"
            if timeout 900 cargo kani --tests --harness "$harness" \
              --solver cadical \
              --default-unwind 30 \
              --no-unwinding-checks \
              --output-format terse 2>&1; then
              echo "✅ $harness — VERIFIED"
              PASSED=$((PASSED + 1))
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "⏰ $harness — TIMEOUT (15min)"
              else
                echo "❌ $harness — FAILED"
              fi
              FAILED=$((FAILED + 1))
              ERRORS="$ERRORS\n❌ $harness"
            fi
            echo "::endgroup::"
          done

          echo ""
          echo "═══════════════════════════════════════"
          echo "  ${{ matrix.suite }}: $PASSED passed, $FAILED failed"
          echo "═══════════════════════════════════════"

          if [ $FAILED -gt 0 ]; then
            echo -e "\nFailed harnesses:$ERRORS"
            exit 1
          fi

  summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Report
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  Kani Formal Verification — 117 proofs"
          echo "═══════════════════════════════════════════════"
          if [ "${{ needs.verify.result }}" = "success" ]; then
            echo "  ✅ ALL PROOFS VERIFIED"
          else
            echo "  ❌ SOME PROOFS FAILED — check individual jobs"
            exit 1
          fi
