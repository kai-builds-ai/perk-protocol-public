name: Verify and Deploy Program
on:
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install solana-verify
        run: cargo install solana-verify --force

      - name: Build verified binary in Docker
        run: solana-verify build --library-name perk_protocol

      - name: Write deployer keypair
        run: echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json

      - name: Configure Solana CLI
        run: |
          solana config set --url ${{ secrets.HELIUS_RPC_URL }} --keypair /tmp/deployer.json

      - name: Deploy program
        run: |
          solana program deploy target/deploy/perk_protocol.so \
            --program-id 3L72e4b8wKJ8ReMpLUeXxVNrRGpiK6m4VYxeSnecpNW2 \
            --upgrade-authority /tmp/deployer.json \
            --keypair /tmp/deployer.json \
            --with-compute-unit-price 50000 \
            --max-sign-attempts 20

      - name: Verify on OtterSec
        run: |
          echo "y" | solana-verify verify-from-repo \
            --remote \
            --program-id 3L72e4b8wKJ8ReMpLUeXxVNrRGpiK6m4VYxeSnecpNW2 \
            https://github.com/kai-builds-ai/perk-protocol-public \
            --commit-hash ${{ github.sha }} \
            --library-name perk_protocol

      - name: Cleanup deployer keypair
        if: always()
        run: rm -f /tmp/deployer.json
