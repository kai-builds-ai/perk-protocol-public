name: Verified Build & Deploy

on:
  workflow_dispatch:

env:
  PROGRAM_ID: "3L72e4b8wKJ8ReMpLUeXxVNrRGpiK6m4VYxeSnecpNW2"
  PROGRAM_LIB_NAME: "perk_protocol"
  PUBLIC_REPO: "https://github.com/kai-builds-ai/perk-protocol-public"
  PUBLIC_COMMIT: "92e7b7d"

jobs:
  verify-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install solana-verify
        run: cargo install solana-verify

      - name: Build verified program (Docker)
        run: solana-verify build --library-name ${{ env.PROGRAM_LIB_NAME }}

      - name: Show build hash
        run: |
          echo "=== Verified build artifact ==="
          ls -la target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          sha256sum target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          echo ""
          echo "=== On-chain program hash ==="
          solana-verify get-program-hash --url "${{ secrets.HELIUS_RPC_URL }}" ${{ env.PROGRAM_ID }} || true

      - name: Write deployer keypair
        run: echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json

      - name: Deploy verified build to mainnet
        run: |
          solana config set --url "${{ secrets.HELIUS_RPC_URL }}"
          solana program deploy \
            target/deploy/${{ env.PROGRAM_LIB_NAME }}.so \
            --program-id ${{ env.PROGRAM_ID }} \
            --keypair /tmp/deployer.json \
            --url "${{ secrets.HELIUS_RPC_URL }}" \
            --with-compute-unit-price 50000

      - name: Clean up deployer key
        if: always()
        run: rm -f /tmp/deployer.json

      - name: Verify hashes match
        run: |
          echo "=== Post-deploy verification ==="
          LOCAL_HASH=$(solana-verify get-executable-hash target/deploy/${{ env.PROGRAM_LIB_NAME }}.so)
          ONCHAIN_HASH=$(solana-verify get-program-hash --url "${{ secrets.HELIUS_RPC_URL }}" ${{ env.PROGRAM_ID }})
          echo "Local hash:   $LOCAL_HASH"
          echo "Onchain hash: $ONCHAIN_HASH"
          if [ "$LOCAL_HASH" = "$ONCHAIN_HASH" ]; then
            echo "✅ VERIFIED — hashes match!"
          else
            echo "❌ MISMATCH"
            exit 1
          fi

      - name: Submit remote verification to OtterSec
        run: |
          solana-verify verify-from-repo \
            -um \
            --program-id ${{ env.PROGRAM_ID }} \
            ${{ env.PUBLIC_REPO }} \
            --commit-hash ${{ env.PUBLIC_COMMIT }} \
            --library-name ${{ env.PROGRAM_LIB_NAME }} || echo "Remote verification submitted (may take time to complete)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-program
          path: target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
