name: Build, Deploy & Verify

on:
  workflow_dispatch:

env:
  PROGRAM_ID: "3L72e4b8wKJ8ReMpLUeXxVNrRGpiK6m4VYxeSnecpNW2"
  PROGRAM_LIB_NAME: "perk_protocol"

jobs:
  build-deploy-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
          key: cargo-verify-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install solana-verify
        run: |
          cargo install solana-verify --force
          solana-verify --version

      - name: Build verified binary
        run: |
          solana-verify build --library-name ${{ env.PROGRAM_LIB_NAME }}
          echo "Build complete. Checking hash..."
          sha256sum target/deploy/${{ env.PROGRAM_LIB_NAME }}.so

      - name: Upload verified binary
        uses: actions/upload-artifact@v4
        with:
          name: verified-program
          path: target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          retention-days: 7

      - name: Configure Solana
        run: |
          solana config set --url ${{ secrets.HELIUS_RPC_URL }}
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > /tmp/deployer.json
          solana config set --keypair /tmp/deployer.json
          solana address
          solana balance

      - name: Deploy verified binary
        run: |
          solana program deploy \
            target/deploy/${{ env.PROGRAM_LIB_NAME }}.so \
            --program-id ${{ env.PROGRAM_ID }} \
            --url ${{ secrets.HELIUS_RPC_URL }} \
            --keypair /tmp/deployer.json

      - name: Submit to OtterSec
        run: |
          echo "y" | solana-verify verify-from-repo \
            --remote \
            --url ${{ secrets.HELIUS_RPC_URL }} \
            --program-id ${{ env.PROGRAM_ID }} \
            https://github.com/kai-builds-ai/perk-protocol-public \
            --library-name ${{ env.PROGRAM_LIB_NAME }} \
            --commit-hash ${{ github.sha }}

      - name: Cleanup
        if: always()
        run: rm -f /tmp/deployer.json

      - name: Check OtterSec status
        run: |
          echo "Waiting 30s for OtterSec to process..."
          sleep 30
          curl -s "https://verify.osec.io/status/${{ env.PROGRAM_ID }}" | jq .
