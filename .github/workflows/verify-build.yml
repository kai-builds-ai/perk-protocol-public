name: Verified Build & Deploy

on:
  workflow_dispatch:

env:
  PROGRAM_ID: "3L72e4b8wKJ8ReMpLUeXxVNrRGpiK6m4VYxeSnecpNW2"
  PROGRAM_LIB_NAME: "perk_protocol"
  PUBLIC_REPO: "https://github.com/kai-builds-ai/perk-protocol-public"

jobs:
  verify-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config libssl-dev

      - name: Install solana-verify
        run: cargo install solana-verify

      - name: Build verified program (Docker)
        run: solana-verify build --library-name ${{ env.PROGRAM_LIB_NAME }}

      - name: Show build hash
        run: |
          echo "=== Verified build artifact ==="
          ls -la target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          sha256sum target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          echo ""
          echo "=== On-chain program hash ==="
          solana-verify get-program-hash --url "${{ secrets.HELIUS_RPC_URL }}" ${{ env.PROGRAM_ID }} || true

      # Deploy step skipped — verified binary already on-chain from previous run

      - name: Verify against public repo
        run: |
          echo "=== Post-deploy verification ==="
          echo "Local executable hash:"
          solana-verify get-executable-hash target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
          echo ""
          echo "On-chain program hash:"
          solana-verify get-program-hash --url "${{ secrets.HELIUS_RPC_URL }}" ${{ env.PROGRAM_ID }} || true
          echo ""
          echo "=== Running verify-from-repo ==="
          echo "n" | solana-verify verify-from-repo \
            -um \
            --program-id ${{ env.PROGRAM_ID }} \
            ${{ env.PUBLIC_REPO }} \
            --commit-hash ${{ github.sha }} \
            --library-name ${{ env.PROGRAM_LIB_NAME }} || true
          echo ""
          echo "=== Submitting to OtterSec remote API ==="
          solana-verify remote submit-job \
            --program-id ${{ env.PROGRAM_ID }} \
            --repo-url ${{ env.PUBLIC_REPO }} \
            --commit-hash ${{ github.sha }} \
            --lib-name ${{ env.PROGRAM_LIB_NAME }} || echo "Remote submission attempted"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-program
          path: target/deploy/${{ env.PROGRAM_LIB_NAME }}.so
